<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Energia</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Segoe UI,Roboto,Arial;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
background:#111827;
padding:30px;
border-radius:16px;
width:440px;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

h1{
text-align:center;
margin-bottom:20px;
font-size:24px;
}

label{
font-size:14px;
margin-top:10px;
display:block;
opacity:0.9;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
font-size:15px;
}

input:focus{
outline:2px solid #3b82f6;
}

.row{
display:flex;
gap:10px;
}

button{
flex:1;
padding:12px;
margin-top:20px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

.calcular{
background:#3b82f6;
color:white;
}

.calcular:hover{
background:#2563eb;
}

.reset{
background:#ef4444;
color:white;
}

.reset:hover{
background:#dc2626;
}

.result{
margin-top:20px;
padding:15px;
background:#1f2937;
border-radius:10px;
line-height:1.8;
}

.result span{
font-weight:bold;
color:#22c55e;
}

</style>
</head>

<body>

<div class="container">

<h1>💡 Calculadora de Energia</h1>

<label>Valor kWh (com tributos)</label>
<input id="kwhValor" type="number" step="0.01">

<label>Quantidade total kWh</label>
<input id="kwhTotal" type="number" step="0.01">

<label>kWh Emanuel</label>
<input id="kwhEmanuel" type="number" step="0.01">

<label>Taxa iluminação pública</label>
<input id="iluminacao" type="number" step="0.01" value="0">

<label>Multa</label>
<input id="multa" type="number" step="0.01" value="0">

<label>Correção monetária</label>
<input id="correcao" type="number" step="0.01" value="0">

<label>Juros</label>
<input id="juros" type="number" step="0.01" value="0">

<label>% Pessoa 2 do restante</label>
<input id="p2" type="number" value="50">

<label>% Pessoa 3 do restante</label>
<input id="p3" type="number" value="50">

<div class="row">
<button class="calcular" onclick="calcular()">Calcular</button>
<button class="reset" onclick="resetar()">Resetar</button>
</div>

<div class="result" id="resultado" style="display:none">

<div>Emanuel paga: <span id="emanuelValor"></span></div>
<div>Valor restante da conta: <span id="restante"></span></div>
<div>Pessoa 2 paga: <span id="pessoa2"></span></div>
<div>Pessoa 3 paga: <span id="pessoa3"></span></div>

</div>

</div>

<script>

function moeda(v){
return "R$ " + v.toFixed(2)
}

function calcular(){

let valorKwh = parseFloat(document.getElementById("kwhValor").value) || 0
let totalKwh = parseFloat(document.getElementById("kwhTotal").value) || 0
let kwhEmanuel = parseFloat(document.getElementById("kwhEmanuel").value) || 0

let iluminacao = parseFloat(document.getElementById("iluminacao").value) || 0
let multa = parseFloat(document.getElementById("multa").value) || 0
let correcao = parseFloat(document.getElementById("correcao").value) || 0
let juros = parseFloat(document.getElementById("juros").value) || 0

let p2 = parseFloat(document.getElementById("p2").value) || 0
let p3 = parseFloat(document.getElementById("p3").value) || 0

if(p2 + p3 != 100){
alert("Os percentuais precisam somar 100%")
return
}

let custosFixos = iluminacao + multa + correcao + juros

let energiaTotal = totalKwh * valorKwh

let parteFixaPessoa = custosFixos / 3

let energiaEmanuel = kwhEmanuel * valorKwh

let pagarEmanuel = energiaEmanuel + parteFixaPessoa

let contaTotal = energiaTotal + custosFixos

let restante = contaTotal - pagarEmanuel

let pagarP2 = restante * (p2/100)
let pagarP3 = restante * (p3/100)

document.getElementById("emanuelValor").innerText = moeda(pagarEmanuel)
document.getElementById("restante").innerText = moeda(restante)
document.getElementById("pessoa2").innerText = moeda(pagarP2)
document.getElementById("pessoa3").innerText = moeda(pagarP3)

document.getElementById("resultado").style.display="block"

}

function resetar(){

document.querySelectorAll("input").forEach(i=>{
i.value=""
})

document.getElementById("p2").value=50
document.getElementById("p3").value=50

document.getElementById("resultado").style.display="none"

}

</script>

</body>
</html>
